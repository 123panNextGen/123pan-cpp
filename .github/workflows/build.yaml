name: Build & Release

on:
  push:
    tags:
      - "v*"

  workflow_dispatch:
    inputs:
      version:
        description: "Version (例如 v3.1.3)"
        required: true
        type: string
      prerelease:
        description: "Prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Matrix build for all platforms ────────────────────────────────
  build:
    name: Build (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            artifact: linux-x64
            binary: 123pan

          - os: ubuntu-24.04-arm
            artifact: linux-arm64
            binary: 123pan

          - os: windows-2025
            artifact: windows-x64
            binary: 123pan.exe
            msvc_arch: amd64
            qt_arch: win64_msvc2022_64
            vcpkg_triplet: x64-windows

          - os: windows-11-vs2026-arm
            artifact: windows-arm64
            binary: 123pan.exe
            msvc_arch: arm64
            qt_arch: win64_msvc2022_arm64
            vcpkg_triplet: arm64-windows

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      # ==========================================================
      #  Linux
      # ==========================================================

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            ccache \
            zip \
            upx \
            qt6-base-dev \
            qt6-base-private-dev \
            qt6-declarative-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-shadertools-dev \
            libgl1-mesa-dev \
            libegl-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libx11-dev \
            zlib1g-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libssl-dev \
            libcurl4-openssl-dev

      - name: Setup ccache (Linux)
        if: runner.os == 'Linux'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.artifact }}-release

      # ── CPR (Linux) ────────────────────────────────────────────
      - name: Cache CPR (Linux)
        if: runner.os == 'Linux'
        id: cache-cpr
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cpr-prefix
          key: cpr-${{ matrix.artifact }}-v1

      - name: Build & install cpr (Linux)
        if: runner.os == 'Linux' && steps.cache-cpr.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/libcpr/cpr.git --depth 1
          cd cpr
          cmake -B build -G Ninja \
            -DCPR_USE_SYSTEM_CURL=ON \
            -DCPR_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/cpr-prefix
          cmake --build build -j$(nproc)
          cmake --install build

      # ==========================================================
      #  Windows
      # ==========================================================

      - name: Install tools (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ninja upx -y

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.msvc_arch }}

      - name: Install Qt (Windows)
        if: runner.os == 'Windows'
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.8.3
          arch: ${{ matrix.qt_arch }}
          cache: true

      - name: Cache vcpkg (Windows)
        if: runner.os == 'Windows'
        id: cache-vcpkg
        uses: actions/cache@v4
        with:
          path: C:\vcpkg
          key: vcpkg-${{ matrix.vcpkg_triplet }}-v1

      - name: Setup vcpkg (Windows)
        if: runner.os == 'Windows' && steps.cache-vcpkg.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg C:\vcpkg
          C:\vcpkg\bootstrap-vcpkg.bat

      - name: Install vcpkg packages (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          C:\vcpkg\vcpkg install `
            cpr:${{ matrix.vcpkg_triplet }} `
            openssl:${{ matrix.vcpkg_triplet }} `
            spdlog:${{ matrix.vcpkg_triplet }} `
            nlohmann-json:${{ matrix.vcpkg_triplet }}

      # ==========================================================
      #  Configure
      # ==========================================================

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/cpr-prefix \
            -DBUILD_GUI=ON \
            -DBUILD_TESTS=OFF

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -B build `
            -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_C_COMPILER=cl `
            -DCMAKE_CXX_COMPILER=cl `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DCMAKE_PREFIX_PATH="$env:Qt6_ROOT_DIR" `
            -DCMAKE_TOOLCHAIN_FILE=C:\vcpkg\scripts\buildsystems\vcpkg.cmake `
            -DBUILD_GUI=ON `
            -DBUILD_TESTS=OFF

      # ==========================================================
      #  Build
      # ==========================================================

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build -j$(nproc)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: cmake --build build --config Release

      # ==========================================================
      #  UPX Compression
      # ==========================================================

      - name: Compress with UPX (Linux)
        if: runner.os == 'Linux'
        run: upx --best --lzma build/123pan

      - name: Compress with UPX (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: upx --best --lzma build\123pan.exe

      # ==========================================================
      #  Package
      # ==========================================================

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp build/123pan .
          chmod +x 123pan
          zip -9 "123pan-${{ matrix.artifact }}.zip" 123pan

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item deploy -ItemType Directory -Force | Out-Null
          Copy-Item build\123pan.exe deploy\
          & "$env:Qt6_DIR\bin\windeployqt.exe" deploy\123pan.exe --dir deploy
          Compress-Archive deploy\* "123pan-${{ matrix.artifact }}.zip"

      # ==========================================================
      #  Upload Artifact
      # ==========================================================

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: 123pan-${{ matrix.artifact }}
          path: 123pan-${{ matrix.artifact }}.zip

  # ── Release ───────────────────────────────────────────────────────
  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download Linux x64
        uses: actions/download-artifact@v8
        with:
          name: 123pan-linux-x64

      - name: Download Linux arm64
        uses: actions/download-artifact@v8
        with:
          name: 123pan-linux-arm64

      - name: Download Windows x64
        uses: actions/download-artifact@v8
        with:
          name: 123pan-windows-x64

      - name: Download Windows arm64
        uses: actions/download-artifact@v8
        with:
          name: 123pan-windows-arm64

      - name: Set Version (tag)
        if: github.event_name == 'push'
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

      - name: Set Version (manual)
        if: github.event_name == 'workflow_dispatch'
        run: echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV

      - name: Release Notes
        run: |
          cat <<EOF > notes.md
          ## 123pan C++

          Version: ${{ env.VERSION }}
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          body_path: notes.md
          prerelease: ${{ github.event.inputs.prerelease || false }}
          generate_release_notes: false
          files: |
            123pan-linux-x64.zip
            123pan-linux-arm64.zip
            123pan-windows-x64.zip
            123pan-windows-arm64.zip
