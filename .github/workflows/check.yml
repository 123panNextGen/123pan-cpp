name: Check & Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Full build + test with GCC 14 / Clang 18 (matrix) ────────────
  check:
    name: Build & Test (${{ matrix.compiler }}, ${{ matrix.build_type }})
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        compiler:
          - gcc-14
          - clang-18
        build_type:
          - Debug
          - Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      # ── system packages ──────────────────────────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            ccache \
            gcc-14 \
            g++-14 \
            clang-18 \
            clang-tools-18 \
            clang-tidy-18 \
            clang-format-18 \
            cppcheck \
            qt6-base-dev \
            qt6-base-private-dev \
            qt6-declarative-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            qt6-shadertools-dev \
            libgl1-mesa-dev \
            libegl-dev \
            libxkbcommon-dev \
            libfontconfig1-dev \
            libdbus-1-dev \
            libx11-dev \
            zlib1g-dev \
            nlohmann-json3-dev \
            libspdlog-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libgtest-dev

      # ── ccache ───────────────────────────────────────────────────
      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.compiler }}-${{ matrix.build_type }}-check

      # ── compiler selection ───────────────────────────────────────
      - name: Setup compiler
        run: |
          if [ "${{ matrix.compiler }}" = "gcc-14" ]; then
            echo "CC=gcc-14" >> $GITHUB_ENV
            echo "CXX=g++-14" >> $GITHUB_ENV
          elif [ "${{ matrix.compiler }}" = "clang-18" ]; then
            echo "CC=clang-18" >> $GITHUB_ENV
            echo "CXX=clang++-18" >> $GITHUB_ENV
          fi

      # ── CPR (cached) ─────────────────────────────────────────────
      - name: Cache CPR
        id: cache-cpr
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cpr-prefix
          key: cpr-linux-x64-v1

      - name: Build & install cpr
        if: steps.cache-cpr.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/libcpr/cpr.git --depth 1
          cd cpr
          cmake -B build -G Ninja \
            -DCPR_USE_SYSTEM_CURL=ON \
            -DCPR_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/cpr-prefix
          cmake --build build -j$(nproc)
          cmake --install build

      # ── configure ────────────────────────────────────────────────
      - name: Configure CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCMAKE_C_COMPILER=${{ env.CC }} \
            -DCMAKE_CXX_COMPILER=${{ env.CXX }} \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/cpr-prefix \
            -DBUILD_TESTS=ON \
            -DBUILD_GUI=ON

      # ── build ────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build -j$(nproc)

      # ── static analysis ──────────────────────────────────────────
      - name: Run cppcheck (static analysis)
        continue-on-error: true
        run: |
          cppcheck --enable=all --suppress=missingIncludeSystem \
            --suppress=unmatchedSuppression --suppress=unusedFunction \
            --suppress=checkersReport --std=c++20 \
            --error-exitcode=0 \
            -I src \
            src/ 2>&1 | tee cppcheck-report.txt

      - name: Run clang-tidy (static analysis)
        if: matrix.compiler == 'clang-18'
        continue-on-error: true
        run: |
          find src -name '*.cpp' -print0 | xargs -0 -P$(nproc) -I{} \
            clang-tidy-18 -p build {} --quiet 2>/dev/null || true

      # ── test ─────────────────────────────────────────────────────
      - name: Run tests
        run: cd build && ctest --output-on-failure -j$(nproc)

      # ── upload report ────────────────────────────────────────────
      - name: Upload cppcheck report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cppcheck-report-${{ matrix.compiler }}-${{ matrix.build_type }}
          path: cppcheck-report.txt

  # ── Sanitizer build ───────────────────────────────────────────────
  sanitizers:
    name: Sanitizers (Address + Undefined)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      # ── system packages (minimal – no GUI) ───────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            nlohmann-json3-dev \
            libspdlog-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libgtest-dev

      # ── CPR (cached) ─────────────────────────────────────────────
      - name: Cache CPR
        id: cache-cpr
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cpr-prefix
          key: cpr-linux-x64-v1

      - name: Build & install cpr
        if: steps.cache-cpr.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/libcpr/cpr.git --depth 1
          cd cpr
          cmake -B build -G Ninja \
            -DCPR_USE_SYSTEM_CURL=ON \
            -DCPR_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/cpr-prefix
          cmake --build build -j$(nproc)
          cmake --install build

      # ── configure ────────────────────────────────────────────────
      - name: Configure with sanitizers
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/cpr-prefix \
            -DBUILD_TESTS=ON \
            -DBUILD_GUI=OFF

      # ── build ────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build -j$(nproc)

      # ── test ─────────────────────────────────────────────────────
      - name: Run tests with sanitizers
        env:
          ASAN_OPTIONS: detect_leaks=1:detect_stack_use_after_return=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: cd build && ctest --output-on-failure -j$(nproc)

  # ── Core library only (no GUI) ────────────────────────────────────
  build-only:
    name: Build only (no GUI dependencies)
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          submodules: 'recursive'

      # ── system packages (minimal – no GUI) ───────────────────────
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            nlohmann-json3-dev \
            libspdlog-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            libgtest-dev

      # ── CPR (cached) ─────────────────────────────────────────────
      - name: Cache CPR
        id: cache-cpr
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/cpr-prefix
          key: cpr-linux-x64-v1

      - name: Build & install cpr
        if: steps.cache-cpr.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/libcpr/cpr.git --depth 1
          cd cpr
          cmake -B build -G Ninja \
            -DCPR_USE_SYSTEM_CURL=ON \
            -DCPR_BUILD_TESTS=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${{ github.workspace }}/cpr-prefix
          cmake --build build -j$(nproc)
          cmake --install build

      # ── configure ────────────────────────────────────────────────
      - name: Configure (core library only)
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCMAKE_PREFIX_PATH=${{ github.workspace }}/cpr-prefix \
            -DBUILD_TESTS=ON \
            -DBUILD_GUI=OFF

      # ── build ────────────────────────────────────────────────────
      - name: Build
        run: cmake --build build -j$(nproc)

      # ── test ─────────────────────────────────────────────────────
      - name: Run tests
        run: cd build && ctest --output-on-failure -j$(nproc)
